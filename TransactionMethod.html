<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Method | GymFirst</title>
  <link rel="icon" type="image/png" href="https://images.template.net/510312/Strength-Gym-Logo-edit-online.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Fjalla+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Gym.css">
  <link rel="stylesheet" href="TransactionMethod.css">
  <link rel="stylesheet" href="auth.css">
  <style>
    .payment-title {
      text-align: center; font-size: 2rem;
      margin-bottom: 1.5rem; letter-spacing: 2px;
    }

    /* Plan summary box */
    .plan-summary {
      background: #111; border: 1px solid #222;
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .plan-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.55rem 0; border-bottom: 1px solid #1e1e1e;
      font-family: 'Montserrat', sans-serif; font-size: 0.88rem; color: #aaa;
    }
    .plan-row:last-child { border-bottom: none; }
    .plan-row strong { color: #e63946; }

    /* Payment method grid */
    .method-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem; margin: 1.2rem 0;
    }

    .pay-method-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.5rem; padding: 1rem 0.5rem;
      background: #111; border: 2px solid #1e1e1e;
      border-radius: 14px; cursor: pointer; color: #aaa;
      font-family: 'Montserrat', sans-serif; font-size: 0.72rem;
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .pay-method-btn:hover  { border-color: #e63946; color: #fff; transform: translateY(-2px); }
    .pay-method-btn.selected { border-color: #e63946; background: #1a0505; color: #fff; }
    .pay-method-btn img { width: 36px; height: 36px; object-fit: contain; border-radius: 8px; }
    .pay-method-btn i   { font-size: 1.6rem; color: #e63946; }

    .selected-label {
      text-align: center; font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem; color: #555; margin-bottom: 1rem; min-height: 1.2rem;
    }
    .selected-label span { color: #e63946; font-weight: 600; }

    /* Confirm button — grey until method selected */
    .confirm-btn {
      width: 100%; padding: 1rem;
      background: transparent; border: 2px solid #333;
      color: #555; font-family: 'Fjalla One', sans-serif;
      font-size: 1rem; letter-spacing: 2px; border-radius: 50px;
      cursor: not-allowed; transition: all 0.3s; margin-top: 0.5rem;
    }
    .confirm-btn.ready {
      border-color: #e63946; color: #e63946; cursor: pointer;
    }
    .confirm-btn.ready:hover { background: #e63946; color: #fff; }
  </style>
</head>

<body style="font-family: 'Fjalla One', sans-serif;">

<header class="header">
  <div class="nav-container">
    <h2 class="logo">GYM<span>First</span></h2>
    <ul class="nav-links">
      <li><a href="Gymindex.html">Home</a></li>
      <li><a href="GymPrograms.html">Programs</a></li>
      <li><a href="trainers.html">Trainers</a></li>
      <li><a href="Membership.html">Membership</a></li>
      <li><a href="AboutUs.html#about">About Us</a></li>

      <span class="nav-indicator"></span>
    </ul>
    <div class="dropdown">
    <div id="ctaArea"></div>
     <!-- <a href="#" class="cta">Join Now</a> -->
    </div>
  </div>
</header>

<section class="transaction-section">
  <div class="transaction-container">

    <h2 class="payment-title">CHOOSE PAYMENT</h2>

    <!-- PLAN SUMMARY — filled from localStorage -->
    <div class="plan-summary">
      <div class="plan-row"><span>Plan</span>      <strong id="planName">—</strong></div>
      <div class="plan-row"><span>Price</span>     <strong id="planPrice">—</strong></div>
      <div class="plan-row"><span>Duration</span>  <strong id="planDuration">—</strong></div>
      <div class="plan-row"><span>Valid Until</span><strong id="validTill">—</strong></div>
    </div>

    <!-- PAYMENT METHOD GRID -->
    <p style="font-size:0.75rem; color:#555; letter-spacing:1.5px; margin-bottom:0.8rem;">
      SELECT A PAYMENT METHOD
    </p>

    <div class="method-grid">
      <button class="pay-method-btn" onclick="selectMethod(this, 'tng', 'Touch n Go')">
        <img src="https://d1eipm3vz40hy0.cloudfront.net/images/Customer+Stories+/TNG_Digital/TNG_logo_4.png" alt="TnG">
        Touch 'n Go
      </button>
      <button class="pay-method-btn" onclick="selectMethod(this, 'grab', 'GrabPay')">
        <img src="https://th.bing.com/th/id/OIP.2ptTTng_CYNE76q5e6tMsQHaFj?w=239&h=180&c=7&r=0&o=7&pid=1.7&rm=3" alt="Grab">
        GrabPay
      </button>
      <button class="pay-method-btn" onclick="selectMethod(this, 'maybank', 'Maybank')">
        <img src="https://th.bing.com/th/id/OIP.PrH-4QasUhG_mpAi8xCeSgHaEK?w=299&h=180&c=7&r=0&o=7&pid=1.7&rm=3" alt="Maybank">
        Maybank
      </button>
      <button class="pay-method-btn" onclick="selectMethod(this, 'card', 'Credit / Debit Card')">
        <i class="fas fa-credit-card"></i>
        Card
      </button>
      <button class="pay-method-btn" onclick="selectMethod(this, 'cash', 'Cash')">
        <i class="fas fa-money-bill-wave"></i>
        Cash
      </button>
    </div>

    <div class="selected-label" id="selectedLabel">No payment method selected</div>

    <button class="confirm-btn" id="confirmBtn" disabled onclick="goToGateway()">
      PROCEED TO PAYMENT <i class="fas fa-arrow-right"></i>
    </button>

  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">
    <p>© 2026 GymFirst. All rights reserved.</p>
  </div>
</footer>

<script>
  // ── Read pendingPayment saved by Transaction.js ──
  const pending = JSON.parse(localStorage.getItem("pendingPayment") || "{}");

  // ── Fill plan summary ──
  document.getElementById("planName").textContent     = pending.planName || "—";
  document.getElementById("planPrice").textContent    = pending.price    || "—";
  document.getElementById("planDuration").textContent = pending.duration || "—";

  // ── Calculate valid until from months ──
  const months  = Number(pending.months) || 1;
  const endDate = new Date();
  endDate.setMonth(endDate.getMonth() + months);
  document.getElementById("validTill").textContent = endDate.toLocaleDateString("en-GB");

  // ── Payment method selection ──
  let chosenMethod     = null;
  let chosenMethodName = null;

  function selectMethod(el, method, label) {
    // Highlight button
    document.querySelectorAll(".pay-method-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");

    chosenMethod     = method;
    chosenMethodName = label;

    document.getElementById("selectedLabel").innerHTML = `Selected: <span>${label}</span>`;

    // Enable confirm button
    const btn    = document.getElementById("confirmBtn");
    btn.disabled = false;
    btn.classList.add("ready");
  }

  // ── Go to PaymentGateway ──
  function goToGateway() {
    if (!chosenMethod) return;

    // Save chosen method into pendingPayment
    pending.paymentMethod     = chosenMethod;
    pending.paymentMethodName = chosenMethodName;
    localStorage.setItem("pendingPayment", JSON.stringify(pending));

    // Navigate to PaymentGateway with all needed info in URL
    const url = `PaymentGateway.html`
      + `?method=${encodeURIComponent(chosenMethod)}`
      + `&price=${encodeURIComponent(pending.price || "RM59")}`
      + `&plan=${encodeURIComponent(pending.planName || "Basic Plan")}`
      + `&duration=${encodeURIComponent(pending.duration || "1 Month")}`;

    window.location.href = url;
  }
</script>

</body>
</html>
