<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction | GymFirst</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Fjalla+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="Gym.css">
  <link rel="stylesheet" href="Transaction.css">
</head>

<body style="font-family: 'Fjalla One', sans-serif;">

<header class="header">
  <div class="nav-container">
    <h2 class="logo">GYM<span>First</span></h2>
    <ul class="nav-links">
      <li><a href="Gymindex.html">Home</a></li>
      <li><a href="GymPrograms.html">Programs</a></li>
      <li><a href="trainers.html">Trainers</a></li>
      <li><a href="Membership.html">Membership</a></li>
      <li><a href="AboutUs.html#about">About Us</a></li>

      <span class="nav-indicator"></span>
    </ul>
    <div class="dropdown">
    <a href="#" class="cta">Join Now</a>
    </div>
  </div>
</header>

<section class="transaction-section">
  <div class="transaction-container">

    <!-- PLAN SUMMARY -->
    <div class="plan-summary">
      <h2 id="planName">Selected Plan</h2>
      <p class="plan-price" id="planPrice">RM0</p>
    </div>

    <!-- TRANSACTION FORM -->
    <form class="transaction-form" id="transaction-form">

      <h3>Member Information</h3>

      <div class="row">
        <input type="text" name="fname" placeholder="First Name" required>
        <input type="text" name="lname" placeholder="Last Name" required>
      </div>

      <div class="row">
        <select name="gender" required>
          <option value="" disabled selected>Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <input type="date" name="dob" required>
      </div>

      <input type="text" name="mobile" placeholder="Phone Number" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="address" placeholder="Home Address" rows="3" required></textarea>

      <div class="join-date">
        <label>Join Date</label>
        <input type="text" id="joinDate" name="joindate" readonly>
      </div>

      <hr style="border-color: #333; margin: 1.5rem 0;">
      <h3>Create Your Login</h3>

      <input type="text" name="username" placeholder="Choose a Username" required>
      <input type="password" name="password" placeholder="Create a Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>

      <!-- Error / Success messages -->
      <p id="form-error" style="color: #ff4444; display:none; margin-top: 0.5rem;"></p>
      <p id="form-success" style="color: #44ff88; display:none; margin-top: 0.5rem;"></p>

      <button type="submit" class="auth-btn" id="submit-btn">
        Confirm & Pay <i class="fas fa-credit-card"></i>
      </button>

    </form>

  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">
    <p>© 2026 GymFirst. All rights reserved.</p>
  </div>
</footer>

<script src="Transaction.js"></script>

</body>
</html>
